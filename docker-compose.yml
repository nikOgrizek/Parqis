services:
  # PostgreSQL Database for MS1
  postgres-ms1:
    image: postgres:15-alpine
    container_name: parqis-postgres-ms1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservations
    ports:
      - "5432:5432"
    volumes:
      - postgres-ms1-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parqis-network

  # PostgreSQL Database for MS2
  postgres-ms2:
    image: postgres:15-alpine
    container_name: parqis-postgres-ms2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parking_spots
    ports:
      - "5433:5432"
    volumes:
      - postgres-ms2-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parqis-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: parqis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - parqis-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: parqis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - parqis-network

  # Redis (optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: parqis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parqis-network

  # MS1 - Reservations Microservice
  ms1-reservations:
    build:
      context: ./ms1-reservations
      dockerfile: Dockerfile
    container_name: parqis-ms1-reservations
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres-ms1:5432/reservations
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ms1-reservations
      KAFKA_GROUP_ID: reservations-group
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production-min-32-chars}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-ms1-internal-api-key-change-me}
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      postgres-ms1:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - parqis-network

  # MS2 - Parking Spots Microservice
  ms2-parking-spots:
    build:
      context: ./ms2-parking-spots
      dockerfile: Dockerfile
    container_name: parqis-ms2-parking-spots
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      APP_ENV: production
      APP_PORT: 8000
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      DATABASE_URL: postgresql://postgres:postgres@postgres-ms2:5432/parking_spots
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${MS2_API_KEY:-ms2-internal-api-key-change-me}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CLIENT_ID: ms2-parking-spots
      KAFKA_GROUP_ID: ms2-parking-spots-group
      KAFKA_RESERVATIONS_TOPIC: reservations
      KAFKA_SPOT_UPDATES_TOPIC: spot-updates
      LOG_LEVEL: info
    depends_on:
      postgres-ms2:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    networks:
      - parqis-network

  # Kafka UI (optional - for development/debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: parqis-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: parqis-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - parqis-network
    profiles:
      - debug

volumes:
  postgres-ms1-data:
    driver: local
  postgres-ms2-data:
    driver: local
  redis-data:
    driver: local

networks:
  parqis-network:
    driver: bridge
