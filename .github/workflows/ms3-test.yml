name: MS3 Validation - Tests

on:
  push:
    paths:
      - 'ms3-validation/**'
      - '.github/workflows/ms3-test.yml'
  pull_request:
    paths:
      - 'ms3-validation/**'
      - '.github/workflows/ms3-test.yml'

jobs:
  test:
    name: Run MS3 tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: ./ms3-validation
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:validation_ci;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          API_KEY: test-api-key
          MS2_GRPC_HOST: localhost
          MS2_GRPC_PORT: 50051
        run: mvn -B test

      - name: Package application
        working-directory: ./ms3-validation
        run: mvn -B -DskipTests package

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ms3-validation
          file: ./ms3-validation/Dockerfile
          push: false
          load: true
          tags: parqis-ms3-validation:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm --entrypoint java parqis-ms3-validation:test -version
          echo "Docker image test successful"
