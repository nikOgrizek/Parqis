name: MS1 Reservations - Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ms1-reservations/**'
      - '.github/workflows/ms1-test.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ms1-reservations/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_reservations
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ms1-reservations/package-lock.json

      - name: Install dependencies
        working-directory: ./ms1-reservations
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./ms1-reservations
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./ms1-reservations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_reservations
        run: npx prisma migrate deploy || echo "No migrations to run"

      - name: Lint code
        working-directory: ./ms1-reservations
        run: npm run lint || echo "Linting skipped"

      - name: Run unit tests
        working-directory: ./ms1-reservations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_reservations
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          KAFKA_BROKERS: localhost:9092
          INTERNAL_API_KEY: test-api-key
          NODE_ENV: test
        run: npm run test:unit

      - name: Run integration tests
        working-directory: ./ms1-reservations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_reservations
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          KAFKA_BROKERS: localhost:9092
          INTERNAL_API_KEY: test-api-key
          NODE_ENV: test
        run: npm run test:integration

      - name: Run all tests with coverage (report only)
        continue-on-error: true
        working-directory: ./ms1-reservations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_reservations
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          KAFKA_BROKERS: localhost:9092
          INTERNAL_API_KEY: test-api-key
          NODE_ENV: test
        run: npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./ms1-reservations/coverage/lcov.info
          flags: ms1-reservations
          name: ms1-codecov
          fail_ci_if_error: false

      - name: Build application
        working-directory: ./ms1-reservations
        run: npm run build

      - name: Test build output
        working-directory: ./ms1-reservations
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - dist directory not found"
            exit 1
          fi
          echo "Build successful"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ms1-reservations
          file: ./ms1-reservations/Dockerfile
          push: false
          tags: parqis-ms1-reservations:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm parqis-ms1-reservations:test node --version
          echo "Docker image test successful"
